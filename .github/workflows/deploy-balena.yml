name: Deploy to Balena

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Balena
        uses: balena-io/deploy-to-balena-action@master
        id: deploy
        with:
          balena_token: ${{ secrets.BALENA_TOKEN }}
          fleet: alexzawadzki/airplay-relay
          source: .
